<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Game Tán Tỉnh 💖</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: pink;
      padding-top: 100px;
    }
    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #yes {
      background: red;
      color: white;
    }
    #no {
      background: gray;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>💌 Bạn có thích mình không?</h1>

  <button id="yes" onclick="yesClick()">Có 💖</button>
  <button id="no" onmouseover="moveBtn()">Không 😢</button>

  <script>
    function yesClick() {
      alert("Biết ngay mà 😆💖");
      document.body.innerHTML = "<h1>💖 Từ giờ bạn là người yêu mình nha 😳</h1>";
    }

    function moveBtn() {
      let x = Math.random() * window.innerWidth;
      let y = Math.random() * window.innerHeight;
      let noBtn = document.getElementById("no");
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  </script>

</body>
</html>
